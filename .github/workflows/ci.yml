name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libseccomp-dev
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Build C core
        run: meson setup c/build c && meson compile -C c/build
      - name: Run unit tests
        run: pytest -m "not integration"

  integration-tests:
    runs-on: ubuntu-22.04
    needs: unit-tests
    timeout-minutes: 60
    env:
      AGEOS_RUN_INTEGRATION: "1"
      AGEOS_CACHE: ${{ github.workspace }}/.ageos-cache
      AGEOS_MODELS_CONFIG: ${{ github.workspace }}/.ageos-cache/ci-models.yaml
      AGEOS_LLAMA_CTX_SIZE: "512"
      AGEOS_MAX_OUTPUT_TOKENS: "32"
      NO_PROXY: 127.0.0.1,localhost
      PNPM_HOME: ${{ github.workspace }}/.pnpm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.2.2 --activate
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
      - name: Install runtime dependencies
        run: ./scripts/install-deps.sh
      - name: Build and install AgeOS
        run: ./scripts/build.sh
      - name: Configure tiny CI model
        run: |
          mkdir -p "$(dirname "$AGEOS_MODELS_CONFIG")"
          cat > "$AGEOS_MODELS_CONFIG" <<'YAML'
          models:
            - name: ci-tiny-instruct
              flavor: llama
              capability: instruct
              tier: tiny
              backend: llama
              repo_id: tensorblock/TinyLlama-1.1B-Chat-v1.0-GGUF
              filename: TinyLlama-1.1B-Chat-v1.0-Q2_K.gguf
              ram_gb: 3
              vram_gb: 0
              context_tokens: 512
          specialties:
            default-instruct:
              capability: instruct
              model: ci-tiny-instruct
          scheduler:
            ram_limit_gb: 4
            vram_limit_gb: 0
          inference:
            host: 127.0.0.1
            port: 8000
            default_specialty: default-instruct
          YAML
      - name: Prepare OpenClaw example
        run: |
          pnpm runtime set node 22.19.0 -g
          echo "$PNPM_HOME/bin" >> "$GITHUB_PATH"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
          mkdir -p examples/openclaw
          cd examples/openclaw
          if [ ! -d openclaw ]; then
            git clone https://github.com/openclaw/openclaw.git --depth 1
          fi
          cd openclaw
          pnpm install --frozen-lockfile
      - name: Run integration tests
        run: pytest -m integration
      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            /tmp/ageos-llama-*.log
            /tmp/openclaw/*.log
            examples/**/.ageos/**/.openclaw/**/*.jsonl
            examples/**/.ageos/**/.openclaw/**/*.json
